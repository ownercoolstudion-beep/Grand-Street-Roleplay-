<!-- ЛОВЕЦ ОШИБОК: если что-то сломается, текст ошибки покажется
     прямо на странице красной плашкой сверху — не нужна консоль браузера -->
<script>
(function(){
  var queue = [];
  var ready = (document.readyState !== 'loading');
  if(!ready) document.addEventListener('DOMContentLoaded', function(){
    ready = true;
    queue.forEach(function(el){ document.body.appendChild(el); });
    queue = [];
  });
  function showErr(prefix, msg){
    var el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#7a0000;color:#fff;padding:14px;font-family:monospace;font-size:12px;z-index:999999;white-space:pre-wrap;max-height:60vh;overflow:auto;border-bottom:3px solid #ff4444';
    el.textContent = prefix + ': ' + msg;
    if(ready && document.body) document.body.appendChild(el);
    else queue.push(el);
  }
  window.addEventListener('error', function(e){
    showErr('JS ОШИБКА', (e.message||'неизвестно')+' | '+(e.filename||'')+':'+(e.lineno||'?')+':'+(e.colno||'?'));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErr('PROMISE ОШИБКА', (r && r.message) ? r.message : String(r));
  });
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     ПОДКЛЮЧЕНИЕ К БАЗЕ ДАННЫХ FIREBASE (Google, бесплатно навсегда)
     ═══════════════════════════════════════════════════════════════
     Как настроить (5 минут, один раз):
     1. Зайди на https://console.firebase.google.com
     2. Нажми "Add project" → придумай любое название → создай проект
     3. В левом меню: Build → Firestore Database → Create database
        → выбери любой регион → режим "Start in test mode" → Enable
     4. Слева вверху рядом с "Project Overview" нажми на шестерёнку ⚙️
        → Project settings → вкладка "General" → долистай до "Your apps"
        → нажми иконку "</>" (Web) → придумай имя приложения → Register app
     5. Скопируй появившийся объект firebaseConfig и вставь ВМЕСТО
        значений "ВСТАВЬ_СЮДА" ниже
     6. В Firestore Database → вкладка "Rules" вставь это и нажми Publish:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /{document=**} { allow read, write: if true; }
          }
        }
     ═══════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
  import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBxwNpFf3uXLZ8SVTArfJTiaaGEqNlShYY",
    authDomain: "forum-db70f.firebaseapp.com",
    projectId: "forum-db70f",
    storageBucket: "forum-db70f.firebasestorage.app",
    messagingSenderId: "228521555435",
    appId: "1:228521555435:web:8aa37e9ec0e3581a4f55ae"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.__fbGet = async function(docId){
    try{
      const snap = await getDoc(doc(db,'gsrp_data',docId));
      if(!snap.exists()) return null;
      const data = snap.data();
      return (data && data.v!==undefined) ? data.v : null;
    }catch(e){ console.error('Firestore get error:', e); return null; }
  };
  window.__fbSet = async function(docId, jsonString){
    try{ await setDoc(doc(db,'gsrp_data',docId), { v: jsonString }); return true; }
    catch(e){ console.error('Firestore set error:', e); return false; }
  };
  window.__firebaseReady = true;
</script>

// ═══════════ STORAGE (реальная база данных Firebase Firestore) ═══════════
// 'xf:user' — это указатель сессии ТОЛЬКО этого браузера, хранится локально.
// Все остальные ключи ('xf:accs','xf:t:*','xf:p:*' и т.д.) хранятся в облаке Firestore
// и видны всем посетителям сайта — это и есть настоящее общее хранилище.
var MEM = {};
// Если Firebase ещё не подключился (первые секунды загрузки на медленном интернете),
// записи временно копятся тут. Как только Firebase готов — они дозаписываются
// в облако, чтобы ничего не терялось из-за медленного соединения.
var PENDING_SYNC = {};
var __syncFlushStarted = false;
function startSyncFlusher(){
  if(__syncFlushStarted) return;
  __syncFlushStarted = true;
  var t = setInterval(function(){
    if(!window.__fbSet) return;
    var keys = Object.keys(PENDING_SYNC);
    if(!keys.length) return;
    keys.forEach(function(docId){
      var json = PENDING_SYNC[docId];
      delete PENDING_SYNC[docId];
      window.__fbSet(docId, json).catch(function(){});
    });
  }, 500);
}
startSyncFlusher();

function sg(k,sh){
  if(k==='xf:user'){
    try{ var raw=localStorage.getItem('gsrp_session'); return Promise.resolve(raw?JSON.parse(raw):null); }
    catch(e){ return Promise.resolve(null); }
  }
  var docId = sh ? k : (k+'_'+(S.user?S.user.name:'anon'));
  if(!window.__fbGet) return Promise.resolve(MEM[docId]!==undefined?MEM[docId]:null);
  return window.__fbGet(docId).then(function(raw){
    if(raw===null||raw===undefined) return null;
    try{ return JSON.parse(raw); }catch(e){ return null; }
  }).catch(function(){ return MEM[docId]!==undefined?MEM[docId]:null; });
}
function ss(k,v,sh){
  if(k==='xf:user'){
    try{ if(v===null||v===undefined) localStorage.removeItem('gsrp_session'); else localStorage.setItem('gsrp_session',JSON.stringify(v)); }catch(e){}
    return Promise.resolve(true);
  }
  var docId = sh ? k : (k+'_'+(S.user?S.user.name:'anon'));
  MEM[docId]=v;
  if(!window.__fbSet){
    // Firebase ещё не готов — запоминаем на дозапись, когда подключится
    PENDING_SYNC[docId] = JSON.stringify(v);
    return Promise.resolve(true);
  }
  return window.__fbSet(docId,JSON.stringify(v)).then(function(){ return true; }).catch(function(){
    PENDING_SYNC[docId] = JSON.stringify(v);
    return true;
  });
}

var PAL=['#7C3AED','#2563EB','#059669','#D97706','#DB2777','#E8212B','#0891B2','#4F46E5','#BE185D','#0E7490'];
function clr(n){ var h=0; for(var i=0;i<(n||'?').length;i++) h=(h<<5)-h+(n||'?').charCodeAt(i); return PAL[Math.abs(h)%PAL.length]; }
function ini(n){ return (n||'?').split(/[_\s]+/).map(function(p){ return p[0]; }).join('').slice(0,2).toUpperCase(); }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,6); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Безопасное сравнение имён — не падает, если в записи (аккаунт/бан) name пустой/битый
function sameNameCI(a,b){ return String(a||'').toLowerCase()===String(b||'').toLowerCase(); }
function fmt(ts){ return new Date(ts).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function ago(ts){ var d=Date.now()-ts; if(d<60000) return 'только что'; if(d<3600000) return Math.floor(d/60000)+' мин.'; if(d<86400000) return Math.floor(d/3600000)+' ч.'; return Math.floor(d/86400000)+' д.'; }
function pwStr(p){ if(!p) return {w:0,c:'#333',t:''}; if(p.length<6) return {w:25,c:'#E8212B',t:'Слабый'}; if(p.length>=8&&/[A-Z]/.test(p)&&/\d/.test(p)) return {w:100,c:'#10B981',t:'Надёжный'}; if(p.length>=8) return {w:70,c:'#3B82F6',t:'Хороший'}; return {w:50,c:'#F5A52A',t:'Средний'}; }

function fmtTxt(raw){
  var s=esc(raw);
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/\*([^*\n]+)\*/g,'<i>$1</i>');
  s=s.replace(/__([^_\n]+)__/g,'<u>$1</u>');
  s=s.replace(/~~([^~\n]+)~~/g,'<s>$1</s>');
  s=s.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi,'<details><summary>👁 Спойлер</summary><div style="margin-top:6px">$1</div></details>');
  s=s.replace(/\[img\](https?:\/\/[^\]]+)\[\/img\]/gi,'<img src="$1" style="max-width:100%;border-radius:5px;margin:6px 0;display:block" class="ctximg">');
  return s;
}

function banUser(name){

  sg('xf:accs',true).then(function(accs){
    var target=(accs||[]).find(function(a){ return a.name===name; });
    if(target&&target.group==='founder'){ toast('🔒 Аккаунт Основателя защищён от бана',true); return; }
    var reason;
    try{ reason=window.prompt('Причина бана для '+name+' (бан навсегда):',''); }catch(err){ reason=''; }
    if(reason===null) return;
    sg('xf:banned',true).then(function(list){
      list=list||[];
      if(list.find(function(b){ return sameNameCI(b.name,name); })){ toast('⚠ Уже забанен',true); return; }
      list.push({name:name,reason:(reason||'').trim()||'Без причины',bannedBy:u.name,ts:Date.now()});

    else if(S.page==='headadminpanel') p=renderPanel('headadmin');

function doLogin(){
  var n=(document.getElementById('lin')?document.getElementById('lin').value:'').trim();
  var p=document.getElementById('lip')?document.getElementById('lip').value:'';
  var e=document.getElementById('lie');
  if(!n||!p){ if(e)e.innerHTML='<div class="erbox">⚠ Заполните все поля</div>'; return; }
  sg('xf:accs',true).then(function(accs){
    accs=accs||[];
    var acc=accs.find(function(a){ return sameNameCI(a.name,n); });
    if(!acc){ if(e)e.innerHTML='<div class="erbox">⚠ Пользователь «'+esc(n)+'» не найден</div>'; return; }
    return sg('xf:banned',true).then(function(blist){
      blist=blist||[];
      var ban=blist.find(function(b){ return sameNameCI(b.name,acc.name); });
      if(ban){ if(e)e.innerHTML='<div class="erbox">🚫 Этот аккаунт заблокирован навсегда.<br>Причина: '+esc(ban.reason)+'</div>'; return; }
      if(acc.pass!==p){ if(e)e.innerHTML='<div class="erbox">⚠ Неверный пароль</div>'; return; }
      var u={name:acc.name,group:acc.group,joinDate:acc.joinDate,postCount:acc.postCount||0,avatarUrl:acc.avatarUrl,bannerUrl:acc.bannerUrl,bio:acc.bio,status:acc.status,title:acc.title,assignedForum:acc.assignedForum||null};
      ss('xf:user',u).then(function(){ S.user=u; trackOnline(u.name); return loadIgnore(); }).then(function(){ closeM(); toast('Добро пожаловать, '+u.name+'!'); render(); });
    });
  });
}
function doReg(){
  var n=(document.getElementById('rgn')?document.getElementById('rgn').value:'').trim();
  var p=document.getElementById('rgp')?document.getElementById('rgp').value:'';
  var p2=document.getElementById('rgp2')?document.getElementById('rgp2').value:'';
  var e=document.getElementById('rge');
  if(!n){ if(e)e.innerHTML='<div class="erbox">⚠ Введите имя</div>'; return; }
  if(n.length<3){ if(e)e.innerHTML='<div class="erbox">⚠ Имя минимум 3 символа</div>'; return; }
  if(!/^[A-Za-zА-Яа-яЁё0-9_\s]+$/.test(n)){ if(e)e.innerHTML='<div class="erbox">⚠ Недопустимые символы</div>'; return; }
  if(p.length<6){ if(e)e.innerHTML='<div class="erbox">⚠ Пароль минимум 6 символов</div>'; return; }
  if(p!==p2){ if(e)e.innerHTML='<div class="erbox">⚠ Пароли не совпадают</div>'; return; }
  sg('xf:accs',true).then(function(accs){
    accs=accs||[];
    if(accs.find(function(a){ return sameNameCI(a.name,n); })){ if(e)e.innerHTML='<div class="erbox">⚠ Имя «'+esc(n)+'» уже занято</div>'; return; }
    return sg('xf:banned',true).then(function(blist){
      blist=blist||[];
      if(blist.find(function(b){ return sameNameCI(b.name,n); })){ if(e)e.innerHTML='<div class="erbox">🚫 Это имя заблокировано навсегда и не может быть использовано снова</div>'; return; }
      var acc={name:n,pass:p,group:'traveler',joinDate:Date.now(),postCount:0};
      accs.push(acc);
      ss('xf:accs',accs,true).then(function(){ var u={name:n,group:'traveler',joinDate:acc.joinDate,postCount:0}; return ss('xf:user',u).then(function(){ S.user=u; trackOnline(n); return loadIgnore(); }); }).then(function(){ closeM(); toast('Добро пожаловать, '+n+'!'); render(); });
    });
  });
}
